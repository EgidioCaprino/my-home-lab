networks:
  web:
    external: true

services:
  caddy:
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/heartbeat" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    image: caddy:latest
    networks:
      - web
    ports:
      - "443:443"
    restart: always
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
