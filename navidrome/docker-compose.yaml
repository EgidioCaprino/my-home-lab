services:
  server:
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: https://navidrome.egidiocaprino.com
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4533/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    image: deluan/navidrome:latest
    networks:
      - web
    restart: always
    user: 1000:1000
    volumes:
      - ./data:/data
      - ./music:/music:ro

networks:
  web:
    external: true
